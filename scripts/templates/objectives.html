<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>{{SLIDE_TITLE}}</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>
    .obj-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--pds-space-2xl);
      height: 100%;
      align-items: center;
      padding: var(--pds-slide-pad-y) var(--pds-slide-pad-x);
    }
    .obj-header {
      display: flex;
      flex-direction: column;
      gap: var(--pds-space-lg);
    }
    .obj-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--pds-space-md);
    }
    .obj-item {
      display: flex;
      align-items: flex-start;
      gap: var(--pds-space-md);
      padding: var(--pds-space-md) var(--pds-space-lg);
      background: var(--pds-bg-surface);
      border: 1px solid var(--pds-border);
      border-radius: var(--pds-radius-lg);
      box-shadow: var(--pds-shadow-card);
    }
    .obj-number {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: rgba(213, 0, 28, 0.12);
      border: 1px solid rgba(213, 0, 28, 0.25);
      border-radius: var(--pds-radius-md);
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-xs);
      font-weight: var(--pds-font-weight-bold);
      color: var(--pds-accent);
      flex-shrink: 0;
    }
    .obj-text {
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-md);
      font-weight: var(--pds-font-weight-regular);
      line-height: var(--pds-line-height);
      color: var(--pds-text-secondary);
      padding-top: 6px;
    }
  </style>
</head>
<body>

<div class="slide" data-slide-id="{{SLIDE_ID}}">

  <div class="obj-layout">

    <!-- Left: heading -->
    <div class="obj-header">
      <span class="pds-eyebrow anim-fade-up">{{MODULE_LABEL}}</span>
      <div class="pds-accent-bar anim-bar-grow" style="--anim-delay: 0.1s;"></div>
      <h2 class="pds-heading-display anim-fade-up" style="--anim-delay: 0.2s;">{{ON_SCREEN_TEXT}}</h2>
      <p class="pds-body anim-fade-up" style="--anim-delay: 0.3s; max-width: 480px;">
        By the end of this module, you will be able to:
      </p>
    </div>

    <!-- Right: objectives list -->
    <ul class="obj-list stagger-children" id="objectives-list">
      {{OBJECTIVES_HTML}}
    </ul>

  </div>

</div>

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/porsche-components.js"></script>
<script>
/* ── SandboxRuntime shim ─────────────────────────────────────────────────── */
var SandboxRuntime = (function () {
  var CR = (function () {
    try { return window.parent && window.parent.CourseRuntime ? window.parent.CourseRuntime : null; }
    catch (_) { return null; }
  })();

  function makeFakeVO() {
    var listeners = {};
    var obj = {
      currentTime: 0,
      _wasPlaying: false,
      addEventListener: function (e, f) { (listeners[e] = listeners[e] || []).push(f); },
      removeEventListener: function (e, f) {
        if (listeners[e]) listeners[e] = listeners[e].filter(function (g) { return g !== f; });
      },
      _fire: function (e) { (listeners[e] || []).forEach(function (f) { f(); }); },
      play: function () { return Promise.resolve(); }
    };
    (function poll() {
      requestAnimationFrame(function () {
        if (CR) {
          obj.currentTime = CR.getAudioCurrentTime ? CR.getAudioCurrentTime() : 0;
          var p = CR.isAudioPlaying ? CR.isAudioPlaying() : false;
          if (!obj._wasPlaying && p) obj._wasPlaying = true;
          if (obj._wasPlaying && !p && obj.currentTime > 0) {
            obj._wasPlaying = false;
            obj._fire('ended');
          }
          obj._fire('timeupdate');
        }
        poll();
      });
    })();
    return obj;
  }

  function makeInteraction() {
    return {
      src: '',
      play: function () {
        if (CR && CR.playInteractionAudio) {
          CR.playInteractionAudio({ src: this.src });
        } else {
          var a = new Audio(this.src);
          a.play().catch(function () {});
        }
        return Promise.resolve();
      }
    };
  }

  window.addEventListener('message', function (e) {
    if (!e.data || e.data.type !== 'player-play-state') return;
    var s = document.querySelector('.slide');
    if (s) s.classList.toggle('is-paused', e.data.state === 'paused');
  });

  return { voAudio: makeFakeVO(), interactionAudio: makeInteraction() };
})();

/* ── Slide logic ─────────────────────────────────────────────────────────── */
(function () {
  // Entrance animations
  document.querySelectorAll('.anim-fade-up, .anim-bar-grow').forEach(function (el) {
    el.classList.add('is-visible');
  });

  // Stagger the objectives list after a short delay
  setTimeout(function () {
    var list = document.getElementById('objectives-list');
    if (list) list.classList.add('is-visible');
  }, 300);

  // VO end → play Click Next
  SandboxRuntime.voAudio.addEventListener('ended', function () {
    SandboxRuntime.interactionAudio.src = '../assets/audio/vo/Click_Next.mp3';
    SandboxRuntime.interactionAudio.play();
  });
})();
</script>

</body>
</html>
