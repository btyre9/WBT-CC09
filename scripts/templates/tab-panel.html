<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>{{SLIDE_TITLE}}</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>

    .slide {
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    /* ── Left panel — title ───────────────────────────────────────────────── */
    .left-panel {
      flex-shrink: 0;
      width: 560px;
      height: 920px;
      background: #0D0D0F;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 100px 56px 80px 100px;
      position: relative;
      z-index: 2;
    }

    .red-accent {
      width: 120px; height: 8px;
      background: var(--pds-accent);
      margin-bottom: 20px;
    }

    .headline {
      font-size: var(--pds-font-size-2xl);
      font-weight: var(--pds-font-weight-bold);
      line-height: 1.08;
      color: var(--pds-text-primary);
      margin: 0 0 20px 0;
    }

    .intro-text {
      font-size: var(--pds-font-size-sm);
      color: var(--pds-contrast-high);
      line-height: 1.55;
      margin: 0;
    }

    /* ── Right panel — tab interface + image ────────────────────────────── */
    .right-panel {
      flex: 1;
      height: 920px;
      background: #111116;
      display: flex;
      flex-direction: row;
      position: relative;
      overflow: hidden;
    }

    /* Tab nav + content column */
    .tab-content-col {
      width: 740px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      padding: 72px 60px 72px 80px;
      position: relative;
      z-index: 2;
    }

    /* Image column */
    .tab-image-col {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .tab-image-col img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.35s ease;
    }

    /* Left-edge scrim so text column blends into the image */
    .tab-image-col::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right,
        #111116 0%,
        rgba(17,17,22,0.55) 18%,
        rgba(17,17,22,0.10) 45%,
        transparent 70%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* ── Tab navigation ──────────────────────────────────────────────────── */
    .tabs-nav {
      display: flex;
      gap: 6px;
      border-bottom: 2px solid rgba(255,255,255,0.14);
      margin-bottom: 36px;
      flex-shrink: 0;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .tab-btn {
      padding: 11px 22px 13px;
      background: rgba(255,255,255,0.03);
      border-top: 1px solid rgba(255,255,255,0.14);
      border-left: 1px solid rgba(255,255,255,0.14);
      border-right: 1px solid rgba(255,255,255,0.14);
      border-bottom: 3px solid transparent;
      border-radius: 6px 6px 0 0;
      margin-bottom: -2px;
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-sm);
      font-weight: var(--pds-font-weight-semibold);
      color: var(--pds-text-muted);
      cursor: pointer;
      transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }
    .tab-btn:hover {
      color: var(--pds-text-secondary);
      border-top-color: rgba(255,255,255,0.24);
      border-left-color: rgba(255,255,255,0.24);
      border-right-color: rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.05);
    }
    .tab-btn.is-active {
      color: var(--pds-text-primary);
      border-top-color: rgba(255,255,255,0.28);
      border-left-color: rgba(255,255,255,0.28);
      border-right-color: rgba(255,255,255,0.28);
      border-bottom-color: var(--pds-accent);
      background: rgba(255,255,255,0.05);
    }
    .tab-btn[aria-disabled="true"] {
      cursor: default;
      opacity: 0.5;
    }

    /* ── Tab panels ──────────────────────────────────────────────────────── */
    .tabs-content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .tab-panel {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      justify-content: flex-start;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .tab-panel.is-active {
      display: flex;
      opacity: 1;
      transform: none;
    }

    .tab-panel__body {
      font-size: 20px;
      line-height: 1.65;
      color: var(--pds-contrast-high);
      margin: 0;
      position: relative;
      z-index: 1;
    }

    /* Decorative step number — large faint numeral behind the body text */
    .tab-panel__step-num {
      position: absolute;
      bottom: -24px;
      right: -10px;
      font-size: 240px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      color: rgba(255,255,255,0.038);
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    /* ── Progress list (left panel) — numbered circles fill red as each tab is visited */
    .progress-list {
      margin: 44px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 0;
      border-top: 1px solid rgba(255,255,255,0.12);
    }
    .progress-list li {
      display: flex;
      gap: 16px;
      align-items: center;
      min-height: 58px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.72);
      font-size: 18px;
      font-weight: 700;
    }
    .progress-list span {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.82);
      font-size: 14px;
      flex-shrink: 0;
      transition: background 0.25s ease, color 0.25s ease;
    }
    .progress-list li.is-seen span {
      background: var(--pds-accent);
      color: #fff;
    }

    /* ── Pre-click prompt (shown before any tab is opened) ───────────────── */
    .prompt {
      color: rgba(255,255,255,0.72);
      font-size: 24px;
      line-height: 1.4;
      max-width: 520px;
      margin: 0;
      padding-top: 12px;
    }
    .prompt.hidden { display: none; }

    /* ── Lock note (visible while INTRO audio plays) ─────────────────────── */
    .lock-note {
      position: absolute;
      left: 80px;
      bottom: 48px;
      color: rgba(255,255,255,0.58);
      font-size: 14px;
      letter-spacing: 0.02em;
    }
    .lock-note.hidden { display: none; }

    /* ── Entrance animations ─────────────────────────────────────────────── */
    .anim-block {
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .anim-block.is-visible { opacity: 1; transform: none; }

  </style>
</head>
<body>

<div class="slide intro-locked" data-slide-id="{{SLIDE_ID}}">

  <!-- Left: title panel -->
  <div class="left-panel">
    <div class="red-accent anim-block" id="el-accent"></div>
    <h2 class="headline anim-block" id="el-headline">{{SLIDE_TITLE}}</h2>
    <p class="intro-text anim-block" id="el-intro">{{ON_SCREEN_TEXT}}</p>
  </div>

  <!-- Right: tab interface + image -->
  <div class="right-panel">
    <div class="tab-content-col" id="tab-content-col">
      <div class="tabs-nav" id="tabs-nav" role="tablist">
{{TAB_BUTTONS_HTML}}
      </div>
      <div class="tabs-content">
        <p class="prompt" id="prompt">Select a tab to explore each topic.</p>
{{TAB_BODY_PANELS_HTML}}
      </div>
      <div class="lock-note" id="lock-note">Tabs unlock when the intro audio ends.</div>
    </div>
    <div class="tab-image-col" id="tab-image-col">
      <img id="tab-image" src="{{IMAGE_PATH}}" alt="" draggable="false">
    </div>
  </div>

</div>

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/slide-pause.js"></script>
<script>
(function () {

  /* ── Entrance animations ───────────────────────────────────────────────── */
  ['el-accent', 'el-headline', 'el-intro'].forEach(function (id, i) {
    var el = document.getElementById(id);
    if (!el) return;
    setTimeout(function () { el.classList.add('is-visible'); }, 80 + i * 120);
  });

  var tabsNav = document.getElementById('tabs-nav');
  if (tabsNav) {
    tabsNav.style.transform = 'translateY(14px)';
    tabsNav.style.transition = 'transform 0.5s ease';
    setTimeout(function () {
      tabsNav.style.transform = '';
    }, 320);
  }

  /* ── Tab image map ─────────────────────────────────────────────────────── */
  var TAB_IMAGE_MAP = {{TAB_IMAGE_MAP_JSON}};
  var tabImg = document.getElementById('tab-image');

  /* ── Tab switching ─────────────────────────────────────────────────────── */
  var buttons = Array.from(document.querySelectorAll('.tab-btn'));
  var panels  = Array.from(document.querySelectorAll('.tab-panel'));
  var slideRoot = document.querySelector('.slide');
  var seen = {};

  function activateTab(btn) {
    if (tabsLocked) return;
    var label = btn.getAttribute('data-tab');
    var audioPath = btn.getAttribute('data-audio');

    buttons.forEach(function (b) {
      b.classList.remove('is-active');
      b.setAttribute('aria-selected', 'false');
      b.setAttribute('tabindex', '-1');
    });
    panels.forEach(function (p) { p.classList.remove('is-active'); });

    btn.classList.add('is-active');
    btn.setAttribute('aria-selected', 'true');
    btn.setAttribute('tabindex', '0');

    var panel = document.getElementById('panel-' + label);
    if (panel) {
      panel.style.opacity = '0';
      panel.style.transform = 'translateY(10px)';
      panel.classList.add('is-active');
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          panel.style.opacity = '';
          panel.style.transform = '';
        });
      });
    }

    /* Hide pre-click prompt */
    var promptEl = document.getElementById('prompt');
    if (promptEl) promptEl.classList.add('hidden');

    /* Mark this tab as seen in the left-panel progress list */
    document.querySelectorAll('.progress-list li').forEach(function (li) {
      if (li.getAttribute('data-step') === label) li.classList.add('is-seen');
    });

    /* Track and unlock Next when all tabs visited */
    seen[label] = true;
    if (Object.keys(seen).length >= buttons.length) {
      window.parent.postMessage({ type: 'sandbox-unlock-next' }, '*');
    }

    /* Swap tab image with a brief fade */
    if (tabImg && TAB_IMAGE_MAP[label]) {
      tabImg.style.opacity = '0';
      setTimeout(function () {
        tabImg.src = TAB_IMAGE_MAP[label];
        tabImg.style.opacity = '';
      }, 180);
    }

    /* Play tab audio via CourseRuntime or fallback to Audio() */
    if (audioPath) {
      var cr = null;
      try { cr = window.parent && window.parent.CourseRuntime; } catch(_) {}
      if (cr && cr.playInteractionAudio) {
        cr.playInteractionAudio({ src: audioPath, pauseNarration: true, resumeNarration: false });
      } else {
        try { new Audio(audioPath).play(); } catch(_) {}
      }
    }
  }

  /* ── Build left-panel progress list from tab data ───────────────────────── */
  (function () {
    var introEl = document.getElementById('el-intro');
    if (!introEl || !buttons.length) return;
    var ul = document.createElement('ul');
    ul.className = 'progress-list';
    ul.setAttribute('aria-label', 'Visited steps');
    buttons.forEach(function (btn, i) {
      var li = document.createElement('li');
      li.setAttribute('data-step', btn.getAttribute('data-tab'));
      li.setAttribute('aria-hidden', 'true');
      li.innerHTML =
        '<span>' + (i + 1) + '</span>' +
        (btn.textContent || btn.innerText).trim();
      ul.appendChild(li);
    });
    /* Fade the list in slightly after the intro text */
    ul.style.transform = 'translateY(14px)';
    ul.style.transition = 'transform 0.5s ease';
    setTimeout(function () {
      ul.style.transform = '';
    }, 480);
    introEl.parentNode.insertBefore(ul, introEl.nextSibling);
  }());

  /* ── Lock Next until all tabs visited ──────────────────────────────────── */
  window.parent.postMessage({ type: 'sandbox-lock-next' }, '*');

  /* ── INTRO lock ─────────────────────────────────────────────────────────── */
  var tabsLocked = true;
  var _introMsgReceived = false;

  function applyLock() {
    tabsLocked = true;
    if (slideRoot) slideRoot.classList.add('intro-locked');
    buttons.forEach(function (b) { b.setAttribute('aria-disabled', 'true'); });
    var lockNote = document.getElementById('lock-note');
    if (lockNote) lockNote.classList.remove('hidden');
  }

  function unlockTabs() {
    if (!tabsLocked) return;
    tabsLocked = false;
    if (slideRoot) slideRoot.classList.remove('intro-locked');
    buttons.forEach(function (b) { b.setAttribute('aria-disabled', 'false'); });
    if (buttons.length > 0) buttons[0].setAttribute('tabindex', '0');
    var lockNote = document.getElementById('lock-note');
    if (lockNote) lockNote.classList.add('hidden');
  }

  applyLock();

  /* Unlock when the player signals INTRO audio has ended. If running standalone
     with no parent player, fall back to unlocking after a short wait. */
  window.addEventListener('message', function (e) {
    if (!e.data || e.data.type !== 'player-intro-state') return;
    _introMsgReceived = true;
    if (e.data.locked) applyLock();
    else unlockTabs();
  });
  setTimeout(function () {
    if (!_introMsgReceived && window.parent === window) unlockTabs();
  }, 300);

  /* ── Tab click/keyboard handlers ──────────────────────────────────────── */
  buttons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      if (!tabsLocked) activateTab(btn);
    });
    btn.addEventListener('keydown', function (e) {
      if (tabsLocked) return;
      var idx = buttons.indexOf(btn);
      if (e.key === 'ArrowRight') {
        e.preventDefault();
        var next = buttons[(idx + 1) % buttons.length];
        activateTab(next);
        next.focus();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        var prev = buttons[(idx - 1 + buttons.length) % buttons.length];
        activateTab(prev);
        prev.focus();
      }
    });
  });

}());
</script>

</body>
</html>
