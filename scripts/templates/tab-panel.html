<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>{{SLIDE_TITLE}}</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>
    /* ── Outer layout — header + tab strip + panel area ──────────────────── */
    .tab-panel-section {
      display: flex;
      flex-direction: column;
      gap: 36px;
      height: 100%;
      padding: var(--pds-slide-pad-y) var(--pds-slide-pad-x);
    }
    .tab-panel-header {
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex-shrink: 0;
      max-width: 1280px;
    }
    .tab-panel-header .pds-accent-bar { width: 120px; height: 6px; }

    /* ────────────────────────────────────────────────────────────────────
       TAB STRIP — notebook-tab silhouette
       Each tab is an outlined shape with rounded top corners and no bottom
       edge. The tabs row carries a single horizontal "spine" line; the
       active tab overlaps that line so it visually merges into the panel
       area below, like a paper tab pulled forward in a folder.
    ──────────────────────────────────────────────────────────────────── */
    .tabs {
      position: relative;
      display: grid;
      grid-template-columns: repeat(var(--tab-count, 4), 1fr);
      gap: 12px;
      flex-shrink: 0;
      border-bottom: 1.5px solid var(--pds-border-strong);
      transition: opacity var(--dur-fast) var(--ease-out);
    }
    .tabs.is-locked { opacity: 0.55; pointer-events: none; }

    .tab {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
      min-height: 130px;
      padding: 80px 28px 22px 28px;
      background: transparent;
      border: 1.5px solid var(--pds-border);
      border-bottom: 0;
      border-radius: 12px 12px 0 0;
      cursor: pointer;
      color: var(--pds-text-primary);
      font-family: inherit;
      text-align: left;
      transition:
        border-color  var(--dur-fast) var(--ease-out),
        background    var(--dur-fast) var(--ease-out);
    }
    .tab:hover {
      border-color: var(--pds-border-strong);
      background: rgba(255, 255, 255, 0.02);
    }
    .tab:focus-visible {
      outline: 2px solid var(--pds-accent);
      outline-offset: -2px;
    }
    /* Active tab: red stroke, and -1.5px margin-bottom to cover the spine
       line under it — produces the classic notebook-tab "pulled forward" look. */
    .tab.is-active {
      border-color: var(--pds-accent);
      margin-bottom: -1.5px;
    }

    /* Oversized accordion-style number — translucent white watermark.
       Anchored mid-tab so the digit tops spill past the rounded top edge
       and get clipped by the tab's overflow:hidden — same "slightly out
       of frame" effect as accordion-content. */
    .tab-number {
      position: absolute;
      top: 60%;
      left: -5px;
      transform: translateY(-50%);
      font-size: 100px;
      font-weight: var(--pds-font-weight-bold);
      line-height: 0.85;
      letter-spacing: -0.04em;
      color: rgba(255, 255, 255, 0.10);
      pointer-events: none;
      z-index: 0;
    }

    /* Label sits at the bottom of the tab, above the number */
    .tab-label {
      position: relative;
      z-index: 1;
      font-size: 28px;
      font-weight: var(--pds-font-weight-bold);
      line-height: var(--pds-line-height-tight);
      letter-spacing: -0.005em;
      color: var(--pds-text-muted);
      transition: color var(--dur-fast) var(--ease-out);
    }
    .tab:hover .tab-label { color: var(--pds-text-secondary); }
    .tab.is-active .tab-label { color: var(--pds-text-primary); }

    /* Visited mark — top-right green check */
    .tab-check {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 2;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--pds-success);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--pds-success);
      background: rgba(9, 208, 135, 0.10);
      opacity: 0;
      transform: scale(0.85);
      transition:
        opacity   var(--dur-normal) var(--ease-out),
        transform var(--dur-normal) var(--ease-out);
      pointer-events: none;
    }
    .tab.visited .tab-check {
      opacity: 1;
      transform: scale(1);
    }
    .tab-check svg { width: 12px; height: 12px; display: block; }

    /* ────────────────────────────────────────────────────────────────────
       PANELS — stacked + crossfade in the space under the tabs/spine
    ──────────────────────────────────────────────────────────────────── */
    .panels {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
    }
    .panel {
      position: absolute;
      inset: 0;
      padding: 40px 8px 0 8px;
      opacity: 0;
      transform: translateY(6px);
      transition:
        opacity   var(--dur-normal) var(--ease-out),
        transform var(--dur-normal) var(--ease-out);
      pointer-events: none;
    }
    .panel.is-active {
      opacity: 1;
      transform: none;
      pointer-events: auto;
    }

    .panel-grid {
      display: grid;
      grid-template-columns: 1fr;
      column-gap: 64px;
      height: 100%;
      align-items: start;
    }
    .panel-grid.has-media {
      grid-template-columns: 1fr 480px;
    }
    .panel-text { max-width: 880px; }
    .panel-text > p {
      font-size: var(--pds-font-size-md);
      font-weight: var(--pds-font-weight-regular);
      line-height: var(--pds-line-height-loose);
      color: var(--pds-text-secondary);
    }
    .panel-text > p + p { margin-top: 14px; }
    .panel-text > p + .acc-bullets { margin-top: 22px; }

    /* Red-dot bullets — identical to accordion-content */
    .acc-bullets {
      list-style: none;
      margin: 18px 0 0 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .acc-bullets li {
      display: flex;
      gap: 14px;
      font-size: var(--pds-font-size-md);
      line-height: 1.45;
      color: var(--pds-contrast-high);
    }
    .acc-bullets li::before {
      content: '';
      flex-shrink: 0;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--pds-accent);
      margin-top: 10px;
    }
    .acc-bullets li strong {
      color: var(--pds-text-primary);
      font-weight: var(--pds-font-weight-bold);
    }

    /* Inline 4:3 media — drop an <img> in or use placeholder */
    .panel-media {
      position: relative;
      width: 100%;
      max-width: 480px;
      aspect-ratio: 4 / 3;
      border-radius: var(--pds-radius-lg);
      overflow: hidden;
      background: #16161a;
    }
    .panel-media > img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: var(--img-pos, center);
      display: block;
    }
  </style>
</head>
<body>

<div class="slide" data-slide-id="{{SLIDE_ID}}">

  <div class="tab-panel-section">

    <!-- Header -->
    <header class="tab-panel-header">
      <div style="display:flex; align-items:flex-end; gap: var(--pds-space-lg);">
        <h2 class="pds-heading-display anim-fade-up" style="--anim-delay: 0.10s;">{{SLIDE_TITLE}}</h2>
        <div class="pds-accent-bar anim-bar-grow" style="--anim-delay: 0.15s; margin-bottom: 8px;"></div>
      </div>
      <p class="pds-body anim-fade-up" style="--anim-delay: 0.20s;">{{ON_SCREEN_TEXT}}</p>
    </header>

    <!-- Tab strip — locked until INTRO ends; first tab pre-active+visited -->
    <div class="tabs is-locked" id="tabs" role="tablist">
{{TAB_PANEL_TABS_HTML}}
    </div>

    <!-- Panels — crossfade between active tab's content -->
    <div class="panels" id="panels">
{{TAB_PANEL_PANELS_HTML}}
    </div>

  </div>

</div>

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/porsche-components.js"></script>
<script>
/* ── SandboxRuntime shim — mirrors accordion-content / card-explore ─────── */
var SandboxRuntime = (function () {
  var CR = (function () {
    try { return window.parent && window.parent.CourseRuntime ? window.parent.CourseRuntime : null; }
    catch (_) { return null; }
  })();

  function makeFakeVO() {
    var listeners = {};
    var obj = {
      currentTime: 0,
      _wasPlaying: false,
      addEventListener: function (e, f) { (listeners[e] = listeners[e] || []).push(f); },
      removeEventListener: function (e, f) {
        if (listeners[e]) listeners[e] = listeners[e].filter(function (g) { return g !== f; });
      },
      _fire: function (e) { (listeners[e] || []).forEach(function (f) { f(); }); },
      play: function () { return Promise.resolve(); }
    };
    (function poll() {
      requestAnimationFrame(function () {
        if (CR) {
          obj.currentTime = CR.getAudioCurrentTime ? CR.getAudioCurrentTime() : 0;
          var p = CR.isAudioPlaying ? CR.isAudioPlaying() : false;
          if (!obj._wasPlaying && p) obj._wasPlaying = true;
          if (obj._wasPlaying && !p && obj.currentTime > 0) {
            obj._wasPlaying = false;
            obj._fire('ended');
          }
          obj._fire('timeupdate');
        }
        poll();
      });
    })();
    return obj;
  }

  function makeInteraction() {
    return {
      src: '',
      play: function () {
        if (CR && CR.playInteractionAudio) {
          CR.playInteractionAudio({ src: this.src });
        } else {
          var a = new Audio(this.src);
          a.play().catch(function () {});
        }
        return Promise.resolve();
      }
    };
  }

  window.addEventListener('message', function (e) {
    if (!e.data || e.data.type !== 'player-play-state') return;
    var s = document.querySelector('.slide');
    if (s) s.classList.toggle('is-paused', e.data.state === 'paused');
  });

  return { voAudio: makeFakeVO(), interactionAudio: makeInteraction() };
})();

/* ── Tab-panel interaction logic ───────────────────────────────────────── */
(function () {
  // Lock Next until all tabs visited
  window.parent.postMessage({ type: 'sandbox-lock-next' }, '*');

  // Audio map + total — reuse card-explore's CLICK trigger plumbing
  var TAB_AUDIO  = {{CARD_AUDIO_MAP}};
  var TOTAL_TABS = {{TOTAL_CARDS}};
  var visited    = new Set();
  var unlocked   = false;

  // Entrance animations
  document.querySelectorAll('.anim-fade-up, .anim-bar-grow').forEach(function (el) {
    el.classList.add('is-visible');
  });

  var tabsEl = document.getElementById('tabs');
  var tabs   = document.querySelectorAll('.tab');
  var panels = document.querySelectorAll('.panel');

  // First tab is pre-active + pre-visited (rendered by parser)
  if (tabs[0]) visited.add(tabs[0].dataset.tab);

  function unlockTabs() {
    if (unlocked) return;
    unlocked = true;
    if (tabsEl) tabsEl.classList.remove('is-locked');
    // Single-tab edge case
    if (visited.size >= TOTAL_TABS) {
      window.parent.postMessage({ type: 'sandbox-unlock-next' }, '*');
    }
  }

  function activate(key, isUserClick) {
    tabs.forEach(function (t) {
      var isThis = (t.dataset.tab === key);
      t.classList.toggle('is-active', isThis);
      t.setAttribute('aria-selected', isThis ? 'true' : 'false');
    });
    panels.forEach(function (p) {
      var isThis = (p.dataset.panel === key);
      p.classList.toggle('is-active', isThis);
      if (isThis) p.removeAttribute('hidden');
      else        p.setAttribute('hidden', '');
    });

    if (isUserClick && !visited.has(key)) {
      visited.add(key);
      var tab = document.querySelector('.tab[data-tab="' + key + '"]');
      if (tab) tab.classList.add('visited');

      var audioPath = TAB_AUDIO[key];
      if (audioPath) {
        SandboxRuntime.interactionAudio.src = audioPath;
        SandboxRuntime.interactionAudio.play();
      }

      if (visited.size >= TOTAL_TABS) {
        window.parent.postMessage({ type: 'sandbox-unlock-next' }, '*');
      }
    }
  }

  tabs.forEach(function (tab) {
    tab.addEventListener('click', function () {
      if (!unlocked) return;
      activate(tab.dataset.tab, true);
    });
    tab.addEventListener('keydown', function (e) {
      if (!unlocked) return;
      if (e.key !== 'ArrowRight' && e.key !== 'ArrowLeft') return;
      e.preventDefault();
      var idx  = Array.prototype.indexOf.call(tabs, tab);
      var next = (e.key === 'ArrowRight')
        ? (idx + 1) % tabs.length
        : (idx - 1 + tabs.length) % tabs.length;
      tabs[next].focus();
      activate(tabs[next].dataset.tab, true);
    });
  });

  // Unlock when INTRO VO ends — same fallback pattern as accordion-content
  setTimeout(function () {
    if (SandboxRuntime.voAudio) {
      SandboxRuntime.voAudio.addEventListener('ended', unlockTabs);
      SandboxRuntime.voAudio.addEventListener('error', unlockTabs);
    }
    try {
      if (!window.parent || !window.parent.CourseRuntime) unlockTabs();
    } catch (_) { unlockTabs(); }
  }, 0);
})();
</script>

</body>
</html>
