<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>{{SLIDE_TITLE}}</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>
    .quote-image-panel {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .quote-image-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    /* Gradient: strong left for text legibility, fades right */
    .quote-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        105deg,
        rgba(14, 15, 17, 0.96) 0%,
        rgba(14, 15, 17, 0.88) 45%,
        rgba(14, 15, 17, 0.40) 75%,
        rgba(14, 15, 17, 0.10) 100%
      );
    }
    .quote-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      height: 100%;
      padding: var(--pds-slide-pad-y) var(--pds-slide-pad-x);
      max-width: 1100px;
      gap: var(--pds-space-xl);
    }
    .quote-header {
      display: flex;
      flex-direction: column;
      gap: var(--pds-space-md);
    }
    /* Opening quote mark */
    .quote-mark {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 120px;
      line-height: 0.6;
      color: var(--pds-accent);
      opacity: 0.6;
      flex-shrink: 0;
      user-select: none;
      align-self: flex-start;
    }
    .quote-text {
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-2xl);
      font-weight: var(--pds-font-weight-regular);
      line-height: 1.35;
      color: var(--pds-text-primary);
      font-style: italic;
      max-width: 900px;
    }
    .quote-divider {
      width: 56px;
      height: 2px;
      background: var(--pds-accent);
      border-radius: 2px;
    }
    .quote-attribution {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .quote-attribution-name {
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-md);
      font-weight: var(--pds-font-weight-semibold);
      color: var(--pds-text-primary);
      letter-spacing: 0.04em;
    }
    .quote-attribution-title {
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-sm);
      font-weight: var(--pds-font-weight-regular);
      color: var(--pds-text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .quote-context {
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-md);
      color: var(--pds-text-secondary);
      line-height: var(--pds-line-height-loose);
      max-width: 680px;
      padding: var(--pds-space-lg);
      background: rgba(33, 34, 37, 0.70);
      border-left: 3px solid rgba(213, 0, 28, 0.50);
      border-radius: 0 var(--pds-radius-md) var(--pds-radius-md) 0;
    }
  </style>
</head>
<body>

<div class="slide" data-slide-id="{{SLIDE_ID}}">

  <!-- Background image -->
  <div class="quote-image-panel">
    <img src="{{IMAGE_PATH}}" alt="" onerror="this.style.display='none'">
    <div class="quote-overlay"></div>
  </div>

  <!-- Quote content -->
  <div class="quote-content">

    <div class="quote-header">
      <span class="pds-eyebrow anim-fade-up">{{MODULE_LABEL}}</span>
      <h2 class="pds-heading-lg anim-fade-up" style="--anim-delay: 0.1s;">{{SLIDE_TITLE}}</h2>
    </div>

    <div style="display: flex; flex-direction: column; gap: var(--pds-space-lg);">
      <div class="quote-mark anim-fade-in" style="--anim-delay: 0.2s;">&ldquo;</div>
      <blockquote class="quote-text anim-fade-up" style="--anim-delay: 0.3s;">
        {{QUOTE_TEXT}}
      </blockquote>
      <div class="quote-divider anim-bar-grow" style="--anim-delay: 0.5s; width: 0;"></div>
      <div class="quote-attribution anim-fade-up" style="--anim-delay: 0.6s;">
        <span class="quote-attribution-name">{{QUOTE_ATTRIBUTION_NAME}}</span>
        <span class="quote-attribution-title">{{QUOTE_ATTRIBUTION_TITLE}}</span>
      </div>
    </div>

    <!-- Optional context box — remove if not needed -->
    <div class="quote-context anim-fade-up" style="--anim-delay: 0.8s;">
      {{ON_SCREEN_TEXT}}
    </div>

  </div>

</div>

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/porsche-components.js"></script>
<script>
/* ── SandboxRuntime shim ─────────────────────────────────────────────────── */
var SandboxRuntime = (function () {
  var CR = (function () {
    try { return window.parent && window.parent.CourseRuntime ? window.parent.CourseRuntime : null; }
    catch (_) { return null; }
  })();

  function makeFakeVO() {
    var listeners = {};
    var obj = {
      currentTime: 0,
      _wasPlaying: false,
      addEventListener: function (e, f) { (listeners[e] = listeners[e] || []).push(f); },
      removeEventListener: function (e, f) {
        if (listeners[e]) listeners[e] = listeners[e].filter(function (g) { return g !== f; });
      },
      _fire: function (e) { (listeners[e] || []).forEach(function (f) { f(); }); },
      play: function () { return Promise.resolve(); }
    };
    (function poll() {
      requestAnimationFrame(function () {
        if (CR) {
          obj.currentTime = CR.getAudioCurrentTime ? CR.getAudioCurrentTime() : 0;
          var p = CR.isAudioPlaying ? CR.isAudioPlaying() : false;
          if (!obj._wasPlaying && p) obj._wasPlaying = true;
          if (obj._wasPlaying && !p && obj.currentTime > 0) {
            obj._wasPlaying = false;
            obj._fire('ended');
          }
          obj._fire('timeupdate');
        }
        poll();
      });
    })();
    return obj;
  }

  function makeInteraction() {
    return {
      src: '',
      play: function () {
        if (CR && CR.playInteractionAudio) {
          CR.playInteractionAudio({ src: this.src });
        } else {
          var a = new Audio(this.src);
          a.play().catch(function () {});
        }
        return Promise.resolve();
      }
    };
  }

  window.addEventListener('message', function (e) {
    if (!e.data || e.data.type !== 'player-play-state') return;
    var s = document.querySelector('.slide');
    if (s) s.classList.toggle('is-paused', e.data.state === 'paused');
  });

  return { voAudio: makeFakeVO(), interactionAudio: makeInteraction() };
})();

/* ── Slide logic ─────────────────────────────────────────────────────────── */
(function () {
  document.querySelectorAll('.anim-fade-up, .anim-fade-in, .anim-bar-grow').forEach(function (el) {
    el.classList.add('is-visible');
  });

})();
</script>

</body>
</html>
