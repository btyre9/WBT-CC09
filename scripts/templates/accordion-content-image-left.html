<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>{{SLIDE_TITLE}}</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>
    /* ── Two-column shell: 3:4 portrait image left, content right ─────────── */
    .accordion-section {
      display: grid;
      grid-template-columns: 600px 1fr;
      column-gap: 80px;
      padding: var(--pds-slide-pad-y) var(--pds-slide-pad-x);
      height: 100%;
      align-items: stretch;
    }
    .accordion-main {
      display: flex;
      flex-direction: column;
      gap: 40px;
      min-width: 0;
    }
    .accordion-image {
      position: relative;
      width: 100%;
      height: 100%;
      max-height: 776px;
      border-radius: var(--pds-radius-lg, 12px);
      overflow: hidden;
      background: #16161a;
      align-self: center;
    }
    .accordion-image > img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: var(--img-pos, center);
      display: block;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .accordion-header {
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex-shrink: 0;
      max-width: 1100px;
    }
    .accordion-header .pds-accent-bar { width: 120px; height: 6px; }

    /* ── Accordion column ───────────────────────────────────────────────── */
    .accordion {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      align-self: flex-start;
    }
    .accordion.is-locked .acc-item { pointer-events: none; opacity: 0.55; }
    .accordion.is-locked .acc-header { cursor: not-allowed; }

    .acc-item {
      position: relative;
      background: var(--pds-bg-surface);
      border: 1px solid var(--pds-border);
      border-radius: var(--pds-radius-lg, 12px);
      overflow: hidden;
      transition:
        background    var(--dur-fast) var(--ease-out),
        border-color  var(--dur-fast) var(--ease-out),
        box-shadow    var(--dur-fast) var(--ease-out),
        opacity       var(--dur-fast) var(--ease-out);
    }
    .acc-item:hover {
      background: var(--pds-bg-surface-hover);
      border-color: var(--pds-border-strong);
    }
    .acc-item.is-open {
      border-color: rgba(213, 0, 28, 0.55);
      box-shadow: var(--pds-shadow-card);
    }
    .acc-item.is-visited {
      border-color: var(--pds-success);
    }
    .acc-item.is-visited.is-open {
      border-color: var(--pds-success);
    }

    /* Left red rail — visible when open */
    .acc-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--pds-accent);
      transform: scaleY(0);
      transform-origin: top;
      transition: transform var(--dur-slow, 0.55s) var(--ease-in-out, cubic-bezier(0.4, 0, 0.2, 1));
    }
    .acc-item.is-open::before { transform: scaleY(1); }

    /* ── Label row ──────────────────────────────────────────────────────── */
    .acc-header {
      position: relative;
      display: flex;
      align-items: center;
      gap: 28px;
      width: 100%;
      padding: 26px 32px 26px 140px;  /* extra left to clear the oversized number */
      background: transparent;
      border: 0;
      cursor: pointer;
      color: var(--pds-text-primary);
      font-family: inherit;
      text-align: left;
    }
    .acc-header:focus-visible {
      outline: 2px solid var(--pds-accent);
      outline-offset: -2px;
    }
    /* Oversized number — absolutely positioned so it can spill past the bar frame */
    .acc-number {
      position: absolute;
      top: 60%;
      left: -5px;
      transform: translateY(-50%);
      font-size: 100px;
      font-weight: var(--pds-font-weight-bold);
      line-height: 0.85;
      letter-spacing: -0.04em;
      color: rgba(255, 255, 255, 0.10);
      pointer-events: none;
      z-index: 0;
    }
    .acc-label {
      flex: 1 1 auto;
      font-size: 28px;
      font-weight: var(--pds-font-weight-bold);
      line-height: var(--pds-line-height-tight);
      letter-spacing: -0.005em;
      color: var(--pds-text-primary);
    }

    /* Chevron — round bezel, rotates on open */
    .acc-chev {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--pds-border-strong);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--pds-text-primary);
      transition:
        transform    var(--dur-slow, 0.55s) var(--ease-in-out, cubic-bezier(0.4, 0, 0.2, 1)),
        background   var(--dur-fast) var(--ease-out),
        border-color var(--dur-fast) var(--ease-out);
    }
    .acc-item:hover .acc-chev { border-color: var(--pds-text-primary); }
    .acc-item.is-open .acc-chev {
      transform: rotate(180deg);
      background: var(--pds-accent);
      border-color: var(--pds-accent);
    }
    .acc-chev svg { width: 18px; height: 18px; display: block; }

    /* ── Body — height animates via grid 0fr → 1fr ─────────────────────── */
    .acc-body-wrap {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows var(--dur-slow, 0.55s) var(--ease-in-out, cubic-bezier(0.4, 0, 0.2, 1));
    }
    .acc-item.is-open .acc-body-wrap { grid-template-rows: 1fr; }
    .acc-body { overflow: hidden; min-height: 0; }
    .acc-body-inner {
      padding: 0 32px 28px 96px;
      opacity: 0;
      transform: translateY(-6px);
      transition:
        opacity   var(--dur-normal, 0.4s) var(--ease-out),
        transform var(--dur-normal, 0.4s) var(--ease-out);
    }
    .acc-item.is-open .acc-body-inner {
      opacity: 1;
      transform: none;
      transition-delay: 0.1s;
    }
    .acc-body p {
      font-size: var(--pds-font-size-md);
      font-weight: var(--pds-font-weight-regular);
      line-height: var(--pds-line-height-loose);
      color: var(--pds-text-secondary);
    }
    .acc-body p + p { margin-top: 14px; }
    .acc-bullets {
      list-style: none;
      margin: 18px 0 0 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .acc-bullets li {
      display: flex;
      gap: 14px;
      font-size: var(--pds-font-size-md);
      line-height: 1.45;
      color: var(--pds-text-secondary);
    }
    .acc-bullets li::before {
      content: '';
      flex-shrink: 0;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--pds-accent);
      margin-top: 10px;
    }
    .acc-bullets li strong {
      color: var(--pds-text-primary);
      font-weight: var(--pds-font-weight-bold);
    }
  </style>
</head>
<body>

<div class="slide" data-slide-id="{{SLIDE_ID}}">

  <div class="accordion-section">

    <!-- 3:4 image rail (left column) -->
    <figure class="accordion-image anim-fade-up" style="--anim-delay: 0.30s;">
      <img src="{{IMAGE_PATH}}" alt="" onerror="this.style.display='none'">
    </figure>

    <div class="accordion-main">

      <!-- Header -->
      <header class="accordion-header">
        <span class="pds-eyebrow anim-fade-up">{{MODULE_LABEL}}</span>
        <div style="display:flex; align-items:flex-end; gap: var(--pds-space-lg);">
          <h2 class="pds-heading-display anim-fade-up" style="--anim-delay: 0.10s;">{{SLIDE_TITLE}}</h2>
          <div class="pds-accent-bar anim-bar-grow" style="--anim-delay: 0.15s; margin-bottom: 8px;"></div>
        </div>
        <p class="pds-body anim-fade-up" style="--anim-delay: 0.20s;">{{ON_SCREEN_TEXT}}</p>
      </header>

      <!-- Accordion — locked until INTRO VO ends -->
      <div class="accordion is-locked stagger-children" id="accordion" role="list">
        {{ACCORDION_ITEMS_HTML}}
      </div>

    </div>

  </div>

</div>

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/porsche-components.js"></script>
<script>
/* ── SandboxRuntime shim — mirrors card-explore.html ─────────────────────── */
var SandboxRuntime = (function () {
  var CR = (function () {
    try { return window.parent && window.parent.CourseRuntime ? window.parent.CourseRuntime : null; }
    catch (_) { return null; }
  })();

  function makeFakeVO() {
    var listeners = {};
    var obj = {
      currentTime: 0,
      _wasPlaying: false,
      addEventListener: function (e, f) { (listeners[e] = listeners[e] || []).push(f); },
      removeEventListener: function (e, f) {
        if (listeners[e]) listeners[e] = listeners[e].filter(function (g) { return g !== f; });
      },
      _fire: function (e) { (listeners[e] || []).forEach(function (f) { f(); }); },
      play: function () { return Promise.resolve(); }
    };
    (function poll() {
      requestAnimationFrame(function () {
        if (CR) {
          obj.currentTime = CR.getAudioCurrentTime ? CR.getAudioCurrentTime() : 0;
          var p = CR.isAudioPlaying ? CR.isAudioPlaying() : false;
          if (!obj._wasPlaying && p) obj._wasPlaying = true;
          if (obj._wasPlaying && !p && obj.currentTime > 0) {
            obj._wasPlaying = false;
            obj._fire('ended');
          }
          obj._fire('timeupdate');
        }
        poll();
      });
    })();
    return obj;
  }

  function makeInteraction() {
    return {
      src: '',
      play: function () {
        if (CR && CR.playInteractionAudio) {
          CR.playInteractionAudio({ src: this.src });
        } else {
          var a = new Audio(this.src);
          a.play().catch(function () {});
        }
        return Promise.resolve();
      }
    };
  }

  window.addEventListener('message', function (e) {
    if (!e.data || e.data.type !== 'player-play-state') return;
    var s = document.querySelector('.slide');
    if (s) s.classList.toggle('is-paused', e.data.state === 'paused');
  });

  return { voAudio: makeFakeVO(), interactionAudio: makeInteraction() };
})();

/* ── Accordion interaction logic ─────────────────────────────────────────── */
(function () {
  // Lock Next until all items visited
  window.parent.postMessage({ type: 'sandbox-lock-next' }, '*');

  // Audio map: label → path  (injected by generator — same shape as card-explore)
  var ITEM_AUDIO  = {{CARD_AUDIO_MAP}};
  var TOTAL_ITEMS = {{TOTAL_CARDS}};
  var visited     = new Set();
  var unlocked    = false;

  // Entrance animations
  document.querySelectorAll('.anim-fade-up, .anim-bar-grow').forEach(function (el) {
    el.classList.add('is-visible');
  });

  var accordion = document.getElementById('accordion');
  var items     = document.querySelectorAll('.acc-item');

  function unlockAccordion() {
    if (unlocked) return;
    unlocked = true;
    if (accordion) {
      accordion.classList.remove('is-locked');
      accordion.classList.add('is-visible');
    }
  }

  function setOpen(target) {
    items.forEach(function (item) {
      var header   = item.querySelector('.acc-header');
      var isTarget = (item === target);
      var willOpen = isTarget && !item.classList.contains('is-open');
      item.classList.toggle('is-open', willOpen);
      if (header) header.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
    });
  }

  function onItemActivate(itemEl, label) {
    if (!unlocked) return;
    setOpen(itemEl);

    // First-time visit: play CLICK audio and track for unlock-Next
    if (!visited.has(label)) {
      visited.add(label);
      itemEl.classList.add('is-visited');
      var audioPath = ITEM_AUDIO[label];
      if (audioPath) {
        SandboxRuntime.interactionAudio.src = audioPath;
        SandboxRuntime.interactionAudio.play();
      }
      if (visited.size >= TOTAL_ITEMS) {
        window.parent.postMessage({ type: 'sandbox-unlock-next' }, '*');
      }
    }
  }

  // Wire click handlers
  items.forEach(function (item) {
    var header = item.querySelector('.acc-header');
    var label  = item.getAttribute('data-item');
    if (!header || !label) return;
    header.addEventListener('click', function () { onItemActivate(item, label); });
  });

  // Unlock when INTRO VO ends
  setTimeout(function () {
    if (SandboxRuntime.voAudio) {
      SandboxRuntime.voAudio.addEventListener('ended', unlockAccordion);
      SandboxRuntime.voAudio.addEventListener('error', unlockAccordion);
    }
    // Local-file fallback (no player wrapper)
    try {
      if (!window.parent || !window.parent.CourseRuntime) unlockAccordion();
    } catch (_) { unlockAccordion(); }
  }, 0);
})();
</script>

</body>
</html>
