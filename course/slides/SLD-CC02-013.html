  <style>
    .closing-layout {
      display: grid;
      grid-template-columns: 1fr 480px;
      gap: var(--pds-space-2xl);
      height: 100%;
      align-items: center;
      padding: var(--pds-slide-pad-y) var(--pds-slide-pad-x);

      gap: var(--pds-space-md);

    /* Summary list */
    .summary-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--pds-space-sm);
    }
    .summary-item {
      display: flex;
      align-items: flex-start;
      gap: var(--pds-space-md);
      padding: 12px var(--pds-space-md);
      border-radius: var(--pds-radius-md);
      transition: background var(--dur-fast);
    }
    .summary-check {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: rgba(213, 0, 28, 0.12);
      border: 1px solid rgba(213, 0, 28, 0.25);
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .summary-check svg {
      width: 14px;
      height: 14px;
      stroke: var(--pds-accent);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .summary-text {
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-md);
      color: var(--pds-text-secondary);
      line-height: var(--pds-line-height);
    }
    .summary-text strong {
      color: var(--pds-text-primary);
      font-weight: var(--pds-font-weight-semibold);
    }
    /* "What's Next" sidebar card */
    .whats-next-card {
      background: var(--pds-bg-surface);
      border: 1px solid var(--pds-border);
      border-radius: var(--pds-radius-xl);
      box-shadow: var(--pds-shadow-card);
      padding: var(--pds-space-xl);
      display: flex;
      flex-direction: column;
      gap: var(--pds-space-lg);
    }
    .whats-next-label {
      display: flex;
      align-items: center;
      gap: var(--pds-space-sm);
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-xs);
      font-weight: var(--pds-font-weight-semibold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--pds-accent);
    }
    .whats-next-label-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--pds-accent);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.7); }
    }
    .whats-next-title {
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-xl);
      font-weight: var(--pds-font-weight-bold);
      line-height: var(--pds-line-height-tight);

    .whats-next-body {

<script>
/* ── SandboxRuntime shim ─────────────────────────────────────────────────── */
var SandboxRuntime = (function () {
  var CR = (function () {
    try { return window.parent && window.parent.CourseRuntime ? window.parent.CourseRuntime : null; }
    catch (_) { return null; }
  })();

  function makeFakeVO() {
    var listeners = {};
    var obj = {
      currentTime: 0,
      _wasPlaying: false,
      addEventListener: function (e, f) { (listeners[e] = listeners[e] || []).push(f); },
      removeEventListener: function (e, f) {
        if (listeners[e]) listeners[e] = listeners[e].filter(function (g) { return g !== f; });
      },
      _fire: function (e) { (listeners[e] || []).forEach(function (f) { f(); }); },
      play: function () { return Promise.resolve(); }
    };
    (function poll() {
      requestAnimationFrame(function () {
        if (CR) {
          obj.currentTime = CR.getAudioCurrentTime ? CR.getAudioCurrentTime() : 0;
          var p = CR.isAudioPlaying ? CR.isAudioPlaying() : false;
          if (!obj._wasPlaying && p) obj._wasPlaying = true;
          if (obj._wasPlaying && !p && obj.currentTime > 0) {
            obj._wasPlaying = false;
            obj._fire('ended');
          }
          obj._fire('timeupdate');
        }
        poll();
      });
    })();
    return obj;
  }

  function makeInteraction() {
    return {
      src: '',
      play: function () {
        if (CR && CR.playInteractionAudio) {
          CR.playInteractionAudio({ src: this.src });
        } else {
          var a = new Audio(this.src);
          a.play().catch(function () {});
        }
        return Promise.resolve();
      }
    };
  }

  window.addEventListener('message', function (e) {
    if (!e.data || e.data.type !== 'player-play-state') return;
    var s = document.querySelector('.slide');
    if (s) s.classList.toggle('is-paused', e.data.state === 'paused');
  });

  return { voAudio: makeFakeVO(), interactionAudio: makeInteraction() };
})();

/* ── Slide logic ─────────────────────────────────────────────────────────── */
(function () {
  document.querySelectorAll('.anim-fade-up, .anim-bar-grow, .anim-fade-left').forEach(function (el) {
    el.classList.add('is-visible');
  });

  // Stagger summary items after header
  setTimeout(function () {
    var list = document.getElementById('summary-list');
    if (list) list.classList.add('is-visible');
  }, 350);

  SandboxRuntime.voAudio.addEventListener('ended', function () {
    SandboxRuntime.interactionAudio.src = '../assets/audio/vo/Click_Start_Quiz.mp3';
    SandboxRuntime.interactionAudio.play();
  });
})();
</script>
