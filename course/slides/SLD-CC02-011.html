<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Educating Customers Prevents Complaints</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>
    .card-section {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: var(--pds-slide-pad-y) var(--pds-slide-pad-x);
      gap: var(--pds-space-lg);
    }
    .card-header {
      display: flex;
      flex-direction: column;
      gap: var(--pds-space-md);
    }
    .card-grid {
      display: flex;
      gap: var(--pds-space-lg);
      flex: 1;
      align-items: stretch;
    }
    /* Each card emitted by the generator via       <div class="explore-card pds-card" data-card="KeyInsight" id="card-KeyInsight" tabindex="0" role="button" aria-label="Explore Key Insight">
        <div class="card-number">01</div>
        <div class="card-title">Key Insight</div>
        <div class="card-body"><!-- Add card detail content here --></div>
        <div class="card-chip">Explore &rarr;</div>
      </div> */
    .explore-card {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: var(--pds-space-md);
      padding: var(--pds-space-xl);
      background: var(--pds-bg-surface);
      border: 1px solid var(--pds-border);
      border-radius: var(--pds-radius-xl);
      box-shadow: var(--pds-shadow-card);
      cursor: pointer;
      transition:
        background  var(--dur-fast) var(--ease-out),
        border-color var(--dur-fast) var(--ease-out),
        box-shadow  var(--dur-fast) var(--ease-out),
        transform   var(--dur-fast) var(--ease-out);
      overflow: hidden;
    }
    .explore-card:hover:not(.is-locked) {
      background: var(--pds-bg-surface-hover);
      border-color: var(--pds-border-strong);
      box-shadow: var(--pds-shadow-card), var(--pds-shadow-glow);
      transform: translateY(-2px);
    }
    .explore-card.is-visited {
      border-color: var(--pds-accent);
    }
    .explore-card.is-visited .card-chip {
      background: rgba(213, 0, 28, 0.20);
      color: var(--pds-accent);
    }
    .card-number {
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-2xl);
      font-weight: var(--pds-font-weight-bold);
      line-height: 1;
      color: rgba(213, 0, 28, 0.20);
    }
    .card-title {
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-xl);
      font-weight: var(--pds-font-weight-semibold);
      line-height: var(--pds-line-height-tight);
      color: var(--pds-text-primary);
    }
    .card-body {
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-md);
      line-height: var(--pds-line-height-loose);
      color: var(--pds-text-secondary);
      flex: 1;
    }
    .card-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      align-self: flex-start;
      margin-top: auto;
      padding: 6px 14px;
      border-radius: var(--pds-radius-pill);
      background: var(--pds-bg-overlay);
      font-family: var(--pds-font-family);
      font-size: var(--pds-font-size-xs);
      font-weight: var(--pds-font-weight-semibold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--pds-text-muted);
      transition: background var(--dur-fast), color var(--dur-fast);
    }
    /* Shimmer on unlocked unvisited cards */
    .explore-card:not(.is-locked):not(.is-visited).is-shimmer::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(
        90deg,
        rgba(255,255,255,0) 30%,
        rgba(255,255,255,0.06) 50%,
        rgba(255,255,255,0) 70%
      );
      background-size: 400%;
      animation: shimmer 2.8s infinite linear;
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>

<div class="slide" data-slide-id="SLD-CC02-011">

  <div class="card-section">

    <!-- Header -->
    <div class="card-header">
      <span class="pds-eyebrow anim-fade-up">Understanding Today's Porsche Customer</span>
      <div style="display:flex; align-items:center; gap: var(--pds-space-lg);">
        <h2 class="pds-heading-display anim-fade-up" style="--anim-delay:0.1s;">Educating Customers Prevents Complaints</h2>
        <div class="pds-accent-bar anim-bar-grow" style="--anim-delay:0.15s; align-self:flex-end; margin-bottom:8px;"></div>
      </div>
      <p class="pds-body anim-fade-up" style="--anim-delay:0.2s;">Top IQS Issues: Where You Can Make a Difference</p>
    </div>

    <!-- Cards grid — locked until INTRO VO ends -->
    <div class="card-grid is-locked stagger-children" id="card-grid">
            <div class="explore-card pds-card" data-card="KeyInsight" id="card-KeyInsight" tabindex="0" role="button" aria-label="Explore Key Insight">
        <div class="card-number">01</div>
        <div class="card-title">Key Insight</div>
        <div class="card-body"><!-- Add card detail content here --></div>
        <div class="card-chip">Explore &rarr;</div>
      </div>
    </div>

  </div>

</div>

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/porsche-components.js"></script>
<script>
/* ── SandboxRuntime shim ─────────────────────────────────────────────────── */
var SandboxRuntime = (function () {
  var CR = (function () {
    try { return window.parent && window.parent.CourseRuntime ? window.parent.CourseRuntime : null; }
    catch (_) { return null; }
  })();

  function makeFakeVO() {
    var listeners = {};
    var obj = {
      currentTime: 0,
      _wasPlaying: false,
      addEventListener: function (e, f) { (listeners[e] = listeners[e] || []).push(f); },
      removeEventListener: function (e, f) {
        if (listeners[e]) listeners[e] = listeners[e].filter(function (g) { return g !== f; });
      },
      _fire: function (e) { (listeners[e] || []).forEach(function (f) { f(); }); },
      play: function () { return Promise.resolve(); }
    };
    (function poll() {
      requestAnimationFrame(function () {
        if (CR) {
          obj.currentTime = CR.getAudioCurrentTime ? CR.getAudioCurrentTime() : 0;
          var p = CR.isAudioPlaying ? CR.isAudioPlaying() : false;
          if (!obj._wasPlaying && p) obj._wasPlaying = true;
          if (obj._wasPlaying && !p && obj.currentTime > 0) {
            obj._wasPlaying = false;
            obj._fire('ended');
          }
          obj._fire('timeupdate');
        }
        poll();
      });
    })();
    return obj;
  }

  function makeInteraction() {
    return {
      src: '',
      play: function () {
        if (CR && CR.playInteractionAudio) {
          CR.playInteractionAudio({ src: this.src });
        } else {
          var a = new Audio(this.src);
          a.play().catch(function () {});
        }
        return Promise.resolve();
      }
    };
  }

  window.addEventListener('message', function (e) {
    if (!e.data || e.data.type !== 'player-play-state') return;
    var s = document.querySelector('.slide');
    if (s) s.classList.toggle('is-paused', e.data.state === 'paused');
  });

  return { voAudio: makeFakeVO(), interactionAudio: makeInteraction() };
})();

/* ── Card interaction logic ──────────────────────────────────────────────── */
(function () {
  // Lock Next until all cards visited
  window.parent.postMessage({ type: 'sandbox-lock-next' }, '*');

  // Audio map: label → path  (injected by generator)
  var CARD_AUDIO = {
  'KeyInsight': '../assets/audio/vo/SLD-CC02-011-CLICK-KeyInsight.mp3'
};
  var TOTAL_CARDS = 1;
  var visited = new Set();
  var cardsUnlocked = false;

  // Entrance animations
  document.querySelectorAll('.anim-fade-up, .anim-bar-grow').forEach(function (el) {
    el.classList.add('is-visible');
  });

  function unlockCards() {
    if (cardsUnlocked) return;
    cardsUnlocked = true;
    var grid = document.getElementById('card-grid');
    if (grid) {
      grid.classList.remove('is-locked');
      grid.classList.add('is-visible');
      // Add shimmer to all unvisited cards
      document.querySelectorAll('.explore-card').forEach(function (c) {
        c.classList.add('is-shimmer');
      });
    }
  }

  function onCardClick(cardEl, label) {
    if (!cardsUnlocked) return;
    if (visited.has(label)) return; // already visited — allow replay but don't double-count

    visited.add(label);
    cardEl.classList.add('is-visited');
    cardEl.classList.remove('is-shimmer');

    // Play CLICK audio
    var audioPath = CARD_AUDIO[label];
    if (audioPath) {
      SandboxRuntime.interactionAudio.src = audioPath;
      SandboxRuntime.interactionAudio.play();
    }

    // All cards visited → unlock Next
    if (visited.size >= TOTAL_CARDS) {
      window.parent.postMessage({ type: 'sandbox-unlock-next' }, '*');
    }
  }

  // Wire up card click handlers
  document.querySelectorAll('.explore-card[data-card]').forEach(function (card) {
    var label = card.getAttribute('data-card');
    card.addEventListener('click', function () { onCardClick(card, label); });
  });

  // Unlock cards when INTRO VO ends
  setTimeout(function () {
    if (SandboxRuntime.voAudio) {
      SandboxRuntime.voAudio.addEventListener('ended', unlockCards);
      SandboxRuntime.voAudio.addEventListener('error', unlockCards);
    }
    // Local file fallback (no player)
    try {
      if (!window.parent || !window.parent.CourseRuntime) unlockCards();
    } catch (_) { unlockCards(); }
  }, 0);
})();
</script>

</body>
</html>
