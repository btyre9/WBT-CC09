<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Understanding Today's Porsche Customer</title>
  <link rel="stylesheet" href="../assets/css/pds-tokens.css">
  <link rel="stylesheet" href="../assets/css/slide-base.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <script>(function(){function s(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1920,window.innerHeight/920));}s();window.addEventListener('resize',s);})();</script>
  <style>
    /* .hero-content: width is now controlled by col-7 in the PDS grid */
    .hero-content {
      display: flex;
      flex-direction: column;
      gap: var(--pds-space-lg);
    }
    .hero-meta {
      display: flex;
      align-items: center;
      gap: var(--pds-space-md);
      margin-top: var(--pds-space-sm);
    }
  </style>
</head>
<body>

<div class="slide" data-slide-id="SLD-CC02-001">

  <!-- Background -->
  <div class="slide__bg">
    <img src="../assets/images/red_911_woman.webp" alt="" onerror="this.style.display='none'">
    <div class="pds-overlay"></div>
  </div>

  <!-- Content — anchored to bottom-left via PDS grid -->
  <div class="slide__content" style="justify-content: flex-end; padding-bottom: 140px;">
    <div class="slide__grid slide__grid--top">

      <!-- col-7: text occupies 7 of 12 columns (~58%), right 5 cols are clear background -->
      <div class="hero-content col-7">
        <span class="pds-eyebrow anim-fade-up">Customer Communications Training</span>
        <div class="pds-accent-bar anim-bar-grow" style="--anim-delay: 0.15s;"></div>
        <h1 class="pds-heading-hero anim-fade-up" style="--anim-delay: 0.25s;">Understanding Today's Porsche Customer</h1>
        <div class="hero-meta anim-fade-up" style="--anim-delay: 0.40s;">
          <span class="pds-caption">Module 2 of 12</span>
        </div>
      </div>

      <!-- cols 8–12: intentionally empty — background image visible here -->

    </div>
  </div>

</div>

<script src="../assets/vendor/gsap/gsap.min.js"></script>
<script src="../assets/vendor/porsche-components.js"></script>
<script>
/* ── SandboxRuntime shim ─────────────────────────────────────────────────── */
var SandboxRuntime = (function () {
  var CR = (function () {
    try { return window.parent && window.parent.CourseRuntime ? window.parent.CourseRuntime : null; }
    catch (_) { return null; }
  })();

  function makeFakeVO() {
    var listeners = {};
    var obj = {
      currentTime: 0,
      _wasPlaying: false,
      addEventListener: function (e, f) { (listeners[e] = listeners[e] || []).push(f); },
      removeEventListener: function (e, f) {
        if (listeners[e]) listeners[e] = listeners[e].filter(function (g) { return g !== f; });
      },
      _fire: function (e) { (listeners[e] || []).forEach(function (f) { f(); }); },
      play: function () { return Promise.resolve(); }
    };
    (function poll() {
      requestAnimationFrame(function () {
        if (CR) {
          obj.currentTime = CR.getAudioCurrentTime ? CR.getAudioCurrentTime() : 0;
          var p = CR.isAudioPlaying ? CR.isAudioPlaying() : false;
          if (!obj._wasPlaying && p) obj._wasPlaying = true;
          if (obj._wasPlaying && !p && obj.currentTime > 0) {
            obj._wasPlaying = false;
            obj._fire('ended');
          }
          obj._fire('timeupdate');
        }
        poll();
      });
    })();
    return obj;
  }

  function makeInteraction() {
    return {
      src: '',
      play: function () {
        if (CR && CR.playInteractionAudio) {
          CR.playInteractionAudio({ src: this.src });
        } else {
          var a = new Audio(this.src);
          a.play().catch(function () {});
        }
        return Promise.resolve();
      }
    };
  }

  window.addEventListener('message', function (e) {
    if (!e.data || e.data.type !== 'player-play-state') return;
    var s = document.querySelector('.slide');
    if (s) s.classList.toggle('is-paused', e.data.state === 'paused');
  });

  return { voAudio: makeFakeVO(), interactionAudio: makeInteraction() };
})();

/* ── Slide logic ─────────────────────────────────────────────────────────── */
(function () {
  // Trigger entrance animations
  document.querySelectorAll('.anim-fade-up, .anim-bar-grow').forEach(function (el) {
    el.classList.add('is-visible');
  });

  // Play "Click Next" cue when VO ends
  SandboxRuntime.voAudio.addEventListener('ended', function () {
    SandboxRuntime.interactionAudio.src = '../assets/audio/vo/Click_Next.mp3';
    SandboxRuntime.interactionAudio.play();
  });
})();
</script>

</body>
</html>
